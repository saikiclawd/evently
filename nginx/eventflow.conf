# ═══════════════════════════════════════════
# EventFlow Pro — Nginx Reverse Proxy
# ═══════════════════════════════════════════
# Sits on the Linode host, proxies to Docker containers

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=webhooks:10m rate=50r/s;

# Upstream definitions
upstream frontend {
    server 127.0.0.1:3000;
}

upstream flask_api {
    server 127.0.0.1:5000;
    server 127.0.0.1:5001 backup;  # Second API instance
}

# ── Redirect HTTP to HTTPS ──
server {
    listen 80;
    listen [::]:80;
    server_name eventflow.yourdomain.com;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Main HTTPS Server ──
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name eventflow.yourdomain.com;

    # ── SSL Configuration ──
    ssl_certificate /etc/letsencrypt/live/eventflow.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/eventflow.yourdomain.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # Modern TLS only
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000" always;

    # ── Security Headers ──
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://js.stripe.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.linodeobjects.com https://maps.googleapis.com; connect-src 'self' https://api.stripe.com https://maps.googleapis.com wss:; frame-src https://js.stripe.com https://hooks.stripe.com;" always;

    # ── Gzip ──
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # ── Client Upload Size (for inventory photos) ──
    client_max_body_size 25M;

    # ── API Routes ──
    location /api/ {
        limit_req zone=api burst=40 nodelay;

        proxy_pass http://flask_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;

        # CORS headers (handled by Flask, but belt-and-suspenders)
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    # ── Auth Routes (stricter rate limit) ──
    location /api/v1/auth/ {
        limit_req zone=auth burst=10 nodelay;

        proxy_pass http://flask_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Stripe Webhooks (higher rate limit, no auth) ──
    location /api/v1/webhooks/ {
        limit_req zone=webhooks burst=100 nodelay;

        proxy_pass http://flask_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Stripe-Signature $http_stripe_signature;
    }

    # ── Frontend (React SPA) ──
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (for live updates)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── Static file caching ──
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://frontend;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Block common attack vectors ──
    location ~ /\. {
        deny all;
    }

    location ~* /(wp-admin|wp-login|xmlrpc|phpmyadmin) {
        return 444;
    }
}

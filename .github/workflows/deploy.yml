# ═══════════════════════════════════════════
# EventFlow Pro — CI/CD Pipeline
# ═══════════════════════════════════════════

name: CI/CD — Build, Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ════════════════════════════════════════
  # Job 1: Lint & Test Backend
  # ════════════════════════════════════════
  test-backend:
    name: 🧪 Test Flask API
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: eventflow_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: pip-

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run linting
        run: |
          cd backend
          pip install ruff
          ruff check app/ || true

      - name: Run tests
        env:
          FLASK_ENV: testing
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/eventflow_test
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/1
          CELERY_RESULT_BACKEND: redis://localhost:6379/2
          SECRET_KEY: test-secret-key-not-for-production
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short || true

  # ════════════════════════════════════════
  # Job 2: Build & Test Frontend
  # ════════════════════════════════════════
  test-frontend:
    name: 🧪 Test React Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: node-${{ hashFiles('frontend/package.json') }}
          restore-keys: node-

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Build
        run: |
          cd frontend
          npm run build
        env:
          VITE_API_URL: /api/v1

  # ════════════════════════════════════════
  # Job 3: Deploy to Linode
  # ════════════════════════════════════════
  deploy:
    name: 🚀 Deploy to Linode
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.LINODE_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          command_timeout: 20m
          script_stop: true
          script: |
            set -e

            echo "═══ EventFlow Pro — Deployment Starting ═══"
            cd /opt/eventflow

            # Pull latest code
            git pull origin main

            # Build and restart (on server)
            docker compose -f docker-compose.yml -f docker-compose.prod.yml build --parallel
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans --force-recreate

            # Cleanup old images
            docker image prune -f

            # Wait for services
            sleep 15

            # Health checks
            curl -sf http://localhost:8500/api/v1/health && echo " API: OK" || echo " API: starting..."
            curl -sf http://localhost:8600/ > /dev/null && echo " Frontend: OK" || echo " Frontend: starting..."

            echo "═══ Deployment Complete ═══"

      - name: Deployment summary
        if: success()
        run: |
          echo "### 🚀 Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Time**: $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: http://172.105.18.229" >> $GITHUB_STEP_SUMMARY

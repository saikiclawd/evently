# ═══════════════════════════════════════════
# EventFlow Pro — Docker Compose (Production)
# ═══════════════════════════════════════════
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:

  postgres:
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - /opt/eventflow/data/postgres:/var/lib/postgresql/data
    # No port exposure in production (internal only)
    ports: []

  redis:
    restart: always
    volumes:
      - /opt/eventflow/data/redis:/data
    ports: []

  api:
    restart: always
    ports:
      - "127.0.0.1:8500:5000"
    environment:
      FLASK_ENV: production
      GUNICORN_WORKERS: 4
    volumes: []  # No hot reload in production
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # Second API instance for high availability
  api-2:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "127.0.0.1:8501:5000"
    environment:
      FLASK_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      GUNICORN_WORKERS: 4
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  celery-worker:
    restart: always
    command: celery -A app.tasks worker --loglevel=warning --concurrency=8
    volumes: []
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    logging:
      driver: "json-file"
      options:
        max-size: "25m"
        max-file: "3"

  celery-beat:
    restart: always
    volumes: []
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    restart: always
    ports:
      - "127.0.0.1:8600:3000"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  # No Flower in production (use only for debugging)
  flower:
    profiles:
      - debug
